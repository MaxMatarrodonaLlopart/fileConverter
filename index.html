<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Markdown to HTML Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Markdown → HTML</h1>

  <div class="container">
    <textarea id="input" placeholder="Escribe Markdown aquí..."></textarea>
    <div id="output"></div>
  </div>

  <button onclick="copyOutput()">Copiar HTML</button>

  <!-- Librería Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
